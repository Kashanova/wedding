<!DOCTYPE html>

<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Bingo</title>

<link href="https://fonts.googleapis.com/css2?family=ABeeZee&display=swap" rel="stylesheet">

<style>
body {
  font-family: "ABeeZee", sans-serif;
  text-align:center;
  background-color: white;
}

body.gameStarted {
    background-image: url("Bingo_card_assets.png");
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
}
  
#bingo {
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:6px;
  max-width:500px;
  margin:auto;
}

.cell {
  padding:10px;
  border-radius:10px;
  background:#eee;
}

.cell.marked {
  background:#4caf50;
  color:white;
}

button {
  margin:10px;
  padding:10px;
  border:none;
  border-radius:8px;
  background:black;
  color:white;
}
</style>

</head>

<body>

<h2>Wedding Bingo</h2>

<div id="join">
  <input id="nickname" placeholder="Your name">
  <input id="table" type="number" placeholder="Table #">
  <button onclick="join()">Start</button>
</div>

<div id="bingo"></div>

<button id="claimBtn" style="display:none;" onclick="claim()">Claim Bingo</button>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
// ===== SUPABASE =====
var db = window.supabase.createClient("https://aveckjhyvkblrgtcxeoi.supabase.co","sb_publishable_vI2nZXL3ID48sdnFMg6dcQ_fxvVtCyJ");

let user = null;
let state = [];
let hasWon = false;

// ===== PROMPTS =====
const PROMPTS = [
  {text:"Someone spills a drink", needsName:true},
  {text:"Someone dancing confidently", needsName:true},
  {text:"Someone takes a selfie", needsName:true},
  {text:"Someone laughs uncontrollably", needsName:true},
  {text:"Bride laughs loudly"},
  {text:"Groom looks nervous"},
  {text:"Crowd cheers"},
  {text:"Speech gets emotional"},
  {text:"Someone asks for WiFi", needsName:true},
  {text:"Dance circle forms"},
  {text:"Someone says wow"},
  {text:"Someone claps off beat"},
  {text:"Camera flashes everywhere"},
  {text:"Food gets praised"},
  {text:"Someone leaves early", needsName:true},
  {text:"Someone arrives late", needsName:true},
  {text:"Someone fixes outfit", needsName:true},
  {text:"Someone whispers gossip", needsName:true},
  {text:"Unexpected emotional moment"},
  {text:"Someone filming everything vertically", needsName:true},

  {text:"Someone drops cutlery loudly", needsName:true},
  {text:"Kid running across the dance floor"},
  {text:"Someone checking themselves in camera reflection", needsName:true},
  {text:"Plate stacked way too high at buffet", needsName:true},
  {text:"Someone asking where the bathroom is", needsName:true},
  {text:"Group photo takes forever to organize"},
  {text:"Someone hyping up the DJ", needsName:true},
  {text:"Someone redoing their hair mid-event", needsName:true},
  {text:"Awkward handshake moment"},
  {text:"Someone recording a slow-mo video", needsName:true},
  {text:"Someone waving at the camera unnecessarily", needsName:true},
  {text:"Elder giving serious life advice", needsName:true},
  {text:"Someone guarding the dessert table", needsName:true},
  {text:"Someone complains about being full", needsName:true},
  {text:"Someone goes back for thirds", needsName:true},
  {text:"Someone struggling with heels", needsName:true},
  {text:"Someone adjusting lighting for photos", needsName:true},
  {text:"Phone flashlight used as a torch", needsName:true},
  {text:"Someone starts an unexpected chant", needsName:true},
  {text:"Someone forgets where they parked", needsName:true},
  {text:"Someone dramatically reacting to food", needsName:true},
  {text:"Someone insisting on one more photo", needsName:true},
  {text:"Someone pretending not to see the camera", needsName:true},
  {text:"Someone checking time repeatedly", needsName:true},
  {text:"Someone coordinating a group selfie", needsName:true},
  {text:"Someone loudly calling someone across the room", needsName:true},
  {text:"Someone nearly trips but recovers", needsName:true},
  {text:"Someone explaining how they know the couple", needsName:true},
  {text:"Someone adjusting their watch or jewelry", needsName:true},
  {text:"Someone giving directions to others", needsName:true},
  {text:"Someone hyping up the bride or groom", needsName:true},
  {text:"Someone trying to find a seat", needsName:true},
  {text:"Someone offering food to others", needsName:true},
  {text:"Someone laughing at their own joke", needsName:true},
  {text:"Someone looking lost", needsName:true},
  {text:"Someone making a dramatic entrance", needsName:true},
  {text:"Someone negotiating table seating", needsName:true},
  {text:"Someone checking their outfit in a spoon reflection", needsName:true},
  {text:"Someone starting a random conversation", needsName:true},
  {text:"Someone giving unsolicited dance lessons", needsName:true}
];

// ===== CARD =====
function generateCard(){
  const shuffled = [...PROMPTS].sort(()=>Math.random()-0.5).slice(0,24);
  let grid=[], idx=0;

  for(let i=0;i<5;i++){
    grid[i]=[];
    for(let j=0;j<5;j++){
      grid[i][j]=(i===2&&j===2)?"FREE":shuffled[idx++];
    }
  }
  return grid;
}

// ===== JOIN =====
async function join(){
  const nickname = document.getElementById("nickname").value || "Guest";
  const table = parseInt(document.getElementById("table").value);

  const { data, error } = await db
    .from("users")
    .insert([{ nickname, table_id: table }])
    .select()
    .single();

  if(error){
    alert("Error joining");
    return;
  }

  user = data;
  document.getElementById("join").style.display = "none";

  render(generateCard());
}

// ===== RENDER =====
function render(grid){
  const c=document.getElementById("bingo");
  c.innerHTML="";
  state=[]; hasWon=false;

  grid.forEach((row,i)=>{
    state[i]=[];
    row.forEach((item,j)=>{
      let d=document.createElement("div");
      d.className="cell";

      if(item==="FREE"){
        d.innerText="FREE";
        d.classList.add("marked");
        state[i][j]=true;
      } else {
        d.innerHTML = `
          <div>${item.text}</div>
          ${item.needsName ? '<input placeholder="Who?" onclick="event.stopPropagation()">' : ''}
        `;
        state[i][j]=false;
      }

      d.onclick = async ()=>{
        if(!user || state[i][j] || item==="FREE") return;

        state[i][j]=true;
        d.classList.add("marked");

        const input = d.querySelector("input");
        const who = input ? input.value : null;
        if(input) input.disabled = true;

        await db.from("bingo_events").insert([{
          user_id: user.id,
          table_id: user.table_id,
          tile: item.text,
          who: who,
          approved: false,
          is_bingo: false
        }]);

        checkWin();
      };

      c.appendChild(d);
    });
  });
}

// ===== CHECK WIN =====
function checkWin(){
  const lines=[
    ...[0,1,2,3,4].map(i=>[0,1,2,3,4].map(j=>[i,j])),
    ...[0,1,2,3,4].map(j=>[0,1,2,3,4].map(i=>[i,j]))
  ];

  for(let line of lines){
    if(line.every(([i,j])=>state[i][j])){
      hasWon=true;
      document.getElementById("claimBtn").style.display="block";
      return;
    }
  }
}

// ===== CLAIM =====
async function claim(){
  await db.from("bingo_events").insert([{
    user_id: user.id,
    table_id: user.table_id,
    tile: "BINGO",
    who: user.nickname,
    approved: false,
    is_bingo: true
  }]);

  alert("Bingo submitted!");
}
</script>

</body>
</html>
