<!DOCTYPE html>

<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Bingo</title>

<link href="https://fonts.googleapis.com/css2?family=ABeeZee&display=swap" rel="stylesheet">

<style>
body {
  font-family: "ABeeZee", sans-serif;
  text-align:center;
}

#join { margin:20px; }

#bingo {
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:6px;
  max-width:500px;
  margin:auto;
}

.cell {
  padding:10px;
  border-radius:10px;
  background:#eee;
}

.cell.marked {
  background:#4caf50;
  color:white;
}

input { width:80%; margin-top:5px; }

button {
  margin:10px;
  padding:10px;
  border:none;
  border-radius:8px;
  background:black;
  color:white;
}
</style>

</head>

<body>

<h2>Wedding Bingo</h2>

<div id="join">
  <input id="nickname" placeholder="Your name">
  <input id="table" type="number" placeholder="Table #">
  <button onclick="join()">Start</button>
</div>

<div id="bingo"></div>

<button id="claimBtn" style="display:none;" onclick="claim()">Claim Bingo</button>

<div id="qr"></div>

<audio id="winSound" src="https://www.soundjay.com/human/cheering-01.mp3"></audio>

<!-- Libraries -->

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<script>
// ===== SUPABASE =====
var db = window.supabase.createClient(
  "https://aveckjhyvkblrgtcxeoi.supabase.co",
  "sb_publishable_vI2nZXL3ID48sdnFMg6dcQ_fxvVtCyJ"
);

// ===== GAME STATE =====
const SALT = "Walima_Maz_Kash_2026";

let user = null;
let state = [];
let hasWon = false;
let winningLine = null;

// ===== PROMPTS =====
const PROMPTS = [
  {text:"Someone spills a drink", needsName:true},
  {text:"Someone dancing confidently", needsName:true},
  {text:"Someone takes a selfie", needsName:true},
  {text:"Someone laughs uncontrollably", needsName:true},
  {text:"Bride laughs loudly"},
  {text:"Groom looks nervous"},
  {text:"Crowd cheers"},
  {text:"Speech gets emotional"},
  {text:"Someone asks for WiFi", needsName:true},
  {text:"Dance circle forms"},
  {text:"Someone says wow"},
  {text:"Someone claps off beat"},
  {text:"Camera flashes everywhere"},
  {text:"Food gets praised"},
  {text:"Someone leaves early", needsName:true},
  {text:"Someone arrives late", needsName:true},
  {text:"Someone fixes outfit", needsName:true},
  {text:"Someone whispers gossip", needsName:true},
  {text:"Unexpected emotional moment"},
  {text:"Someone filming everything vertically", needsName:true}
];

// ===== CARD GENERATION =====
function generateCard(){
  const shuffled = [...PROMPTS].sort(()=>Math.random()-0.5).slice(0,24);
  let grid=[], idx=0;

  for(let i=0;i<5;i++){
    grid[i]=[];
    for(let j=0;j<5;j++){
      grid[i][j]=(i===2&&j===2)?"FREE":shuffled[idx++];
    }
  }
  return grid;
}

// ===== JOIN =====
async function join(){
  console.log("Join clicked");

  const nickname = document.getElementById("nickname").value || "Guest";
  const table = parseInt(document.getElementById("table").value);

  const { data, error } = await db
    .from("users")
    .insert([{ nickname, table_id: table }])
    .select()
    .single();

  if(error){
    console.error(error);
    alert("Error joining");
    return;
  }

  user = data;
  document.getElementById("join").style.display = "none";

  render(generateCard());
}

// ===== RENDER =====
function render(grid){
  const c=document.getElementById("bingo");
  c.innerHTML="";
  state=[]; hasWon=false;

  grid.forEach((row,i)=>{
    state[i]=[];
    row.forEach((item,j)=>{
      let d=document.createElement("div");
      d.className="cell";

      if(item==="FREE"){
        d.innerText="FREE";
        d.classList.add("marked");
        state[i][j]=true;
      } else {
        d.innerHTML = `
          <div>${item.text}</div>
          ${item.needsName ? '<input placeholder="Who?">' : ''}
        `;
        state[i][j]=false;
      }

      d.onclick = async ()=>{
        if(!user || state[i][j] || item==="FREE") return;

        state[i][j]=true;
        d.classList.add("marked");

        const input = d.querySelector("input");
        const who = input ? input.value : null;
        if(input) input.disabled = true;

        const { error } = await db.from("bingo_events").insert([{
          user_id: user.id,
          table_id: user.table_id,
          tile: item.text,
          who: who
        }]);

        if(error){
          console.error(error);
        }

        checkWin();
      };

      c.appendChild(d);
    });
  });
}

// ===== CHECK WIN =====
function checkWin(){
  const lines=[
    ...[0,1,2,3,4].map(i=>[0,1,2,3,4].map(j=>[i,j])),
    ...[0,1,2,3,4].map(j=>[0,1,2,3,4].map(i=>[i,j]))
  ];

  for(let line of lines){
    if(line.every(([i,j])=>state[i][j])){
      hasWon=true;
      winningLine=line;

      document.getElementById("claimBtn").style.display="block";
      document.getElementById("winSound").play();
      return;
    }
  }
}

// ===== SAFE HASH =====
async function hash(str){
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(str));
  const arr = Array.from(new Uint8Array(buf));
  return arr.map(b=>b.toString(16).padStart(2,"0")).join("").slice(0,8);
}

// ===== CLAIM =====
async function claim(){
  const code = await hash(Date.now() + SALT);

  const payload = JSON.stringify({
    user: user.nickname,
    table: user.table_id,
    code
  });

  QRCode.toCanvas(payload, {width:200}, (err, canvas)=>{
    document.getElementById("qr").innerHTML="";
    document.getElementById("qr").appendChild(canvas);
  });
}
</script>

</body>
</html>
